
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soal Pilihan Ganda — Bahasa Indonesia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f2;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .wrapper { max-width: 760px; margin: 0 auto; }

  .header {
    background: #fff;
    border: 1px solid #e5e5e0;
    border-radius: 14px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.25rem;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #111; }
  .header p { font-size: 13px; color: #777; margin-top: 4px; }
  .progress-bar {
    height: 4px;
    background: #eee;
    border-radius: 99px;
    margin-top: 14px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #3b82f6;
    border-radius: 99px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn {
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #444;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: #f5f5f2; }
  .btn.active { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; font-weight: 500; }
  .score-badge {
    margin-left: auto;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 8px;
    background: #fff;
    color: #666;
    border: 1px solid #e5e5e0;
  }
  .score-badge span { font-weight: 600; color: #111; }

  .question-card {
    background: #fff;
    border: 1px solid #e5e5e0;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s, background 0.2s;
  }
  .question-card.answered { border-color: #c7d2fe; }
  .question-card.correct { border-color: #86efac; background: #f0fdf4; }
  .question-card.wrong { border-color: #fca5a5; background: #fef2f2; }

  .q-header {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 1rem;
  }
  .q-num {
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .q-num.correct-num { background: #dcfce7; color: #16a34a; }
  .q-num.wrong-num { background: #fee2e2; color: #dc2626; }
  .q-text { font-size: 14px; line-height: 1.65; color: #1a1a1a; }
  .q-text .blockquote {
    display: block;
    background: #f8f8f6;
    border: 1px solid #e5e5e0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.7;
    margin: 8px 0;
    color: #1a1a1a;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-left: 40px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #e5e5e0;
    cursor: pointer;
    font-size: 13px;
    line-height: 1.5;
    color: #1a1a1a;
    background: #fafafa;
    transition: background 0.15s, border-color 0.15s;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .option:hover:not(:disabled) { background: #f0f0f0; border-color: #ccc; }
  .option.selected { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
  .option.correct-ans { background: #f0fdf4; border-color: #86efac; color: #15803d; }
  .option.wrong-ans { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
  .option:disabled { cursor: default; }
  .option-label {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.6;
  }

  .q-result {
    margin-left: 40px;
    margin-top: 10px;
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 8px;
    display: none;
  }
  .q-result.show { display: block; }
  .q-result.success { color: #15803d; background: #dcfce7; }
  .q-result.danger { color: #dc2626; background: #fee2e2; }

  .submit-area {
    background: #fff;
    border: 1px solid #e5e5e0;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.5rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .summary { font-size: 13px; color: #777; }
  .btn-submit {
    font-size: 14px;
    padding: 9px 28px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: #fff;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  .btn-submit:hover:not(:disabled) { opacity: 0.82; }
  .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <h1>Soal Pilihan Ganda — PJOK</h1>
    <p>Pilih satu jawaban yang paling tepat untuk setiap soal</p>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>

  <div class="controls">
    <button class="btn active" onclick="filterQuestions('all')">Semua soal</button>
    <button class="btn" onclick="filterQuestions('unanswered')">Belum dijawab</button>
    <button class="btn" onclick="filterQuestions('answered')">Sudah dijawab</button>
    <div class="score-badge">Terjawab: <span id="answered-count">0</span> / <span id="total-count">50</span></div>
  </div>

  <div id="questions-container"></div>

  <div class="submit-area">
    <div class="summary" id="summary-text">Jawab semua soal untuk melihat nilai akhir</div>
    <button class="btn-submit" id="submit-btn" onclick="submitAll()" disabled>Kumpulkan Jawaban</button>
  </div>

</div>

<script>
const questions = [
  { q: 'Arah serangan kaki, kecuali', options: ['Atas','Belakang','Samping','Busur sisi','Semua benar'], answer: [0,1,2,3,4] },
  { q: 'Unsur pencak silat, kecuali', options: ['Hiburan','Olahraga','Bela diri','Seni','Persaudaraan'], answer: 0 },
  { q: 'Pertandingan dengan tiga pesilat disebut kategori', options: ['Tanding','Regu','Ganda','Tunggal','Campuran'], answer: 1 },
  { q: 'Anggota tubuh yang tidak digunakan untuk menangkis adalah', options: ['Tangan','Kaki','Siku','Kepala','Semua benar'], answer: 4 },
  { q: 'Waktu istirahat antar babak adalah', options: ['1 menit','2 menit','3 menit','4 menit','5 menit'], answer: 0 },

  { q: 'Jumlah babak dalam pertandingan pencak silat adalah', options: ['1','2','3','4','5'], answer: 2 },
  { q: 'Nilai untuk tendangan adalah', options: ['1','2','3','4','5'], answer: 1 },
  { q: 'Nilai untuk pukulan adalah', options: ['1','2','3','4','5'], answer: 0 },
  { q: 'Organisasi pencak silat Indonesia adalah', options: ['IPSI','PSSI','PBSI','FIFA','PERBASI'], answer: 0 },
  { q: 'Teknik dasar pencak silat meliputi', options: ['Kuda-kuda','Sikap pasang','Langkah','Serangan','Semua benar'], answer: 4 },

  { q: 'Gerakan menghindar disebut', options: ['Elakan','Serangan','Pukulan','Tendangan','Kuncian'], answer: 0 },
  { q: 'Gerakan menahan serangan disebut', options: ['Tangkisan','Serangan','Elakan','Pukulan','Tendangan'], answer: 0 },
  { q: 'Serangan dengan tangan disebut', options: ['Pukulan','Tendangan','Elakan','Kuncian','Langkah'], answer: 0 },
  { q: 'Serangan dengan kaki disebut', options: ['Tendangan','Pukulan','Elakan','Kuncian','Langkah'], answer: 0 },
  { q: 'Teknik menjatuhkan lawan disebut', options: ['Bantingan','Pukulan','Tendangan','Elakan','Langkah'], answer: 0 },

  { q: 'Sikap dasar pencak silat adalah', options: ['Kuda-kuda','Langkah','Tendangan','Pukulan','Elakan'], answer: 0 },
  { q: 'Langkah digunakan untuk', options: ['Berpindah','Menyerang','Menjatuhkan','Mengunci','Diam'], answer: 0 },
  { q: 'Kuda-kuda berfungsi untuk', options: ['Keseimbangan','Serangan','Lompatan','Elakan','Diam'], answer: 0 },
  { q: 'Sikap pasang digunakan untuk', options: ['Bertahan & menyerang','Duduk','Tidur','Diam','Lari'], answer: 0 },
  { q: 'Elakan bertujuan untuk', options: ['Menghindar','Menyerang','Menjatuhkan','Mengunci','Diam'], answer: 0 },

  { q: 'Tangkisan bertujuan untuk', options: ['Menahan serangan','Menyerang','Melompat','Menghindar','Diam'], answer: 0 },
  { q: 'Kuncian bertujuan untuk', options: ['Mengunci lawan','Menendang','Memukul','Menghindar','Diam'], answer: 0 },
  { q: 'Bantingan bertujuan untuk', options: ['Menjatuhkan lawan','Menyerang','Melompat','Menghindar','Diam'], answer: 0 },
  { q: 'Pertahanan disebut', options: ['Belaan','Serangan','Langkah','Pukulan','Tendangan'], answer: 0 },
  { q: 'Serangan disebut', options: ['Ofensif','Defensif','Pasif','Aktif','Netral'], answer: 0 },

  { q: 'Jumlah wasit dalam pertandingan adalah', options: ['1','2','3','4','5'], answer: 0 },
  { q: 'Jumlah juri dalam pertandingan adalah', options: ['3','4','5','6','7'], answer: 2 },
  { q: 'Pakaian pencak silat berwarna', options: ['Hitam','Putih','Merah','Biru','Hijau'], answer: 0 },
  { q: 'Sabuk pencak silat disebut', options: ['Stagen','Sabuk','Ikat pinggang','Kain','Tali'], answer: 1 },
  { q: 'Tempat pertandingan disebut', options: ['Gelanggang','Lapangan','Arena','Ring','Stadion'], answer: 0 },

  { q: 'Ukuran gelanggang adalah', options: ['10x10','8x8','6x6','12x12','14x14'], answer: 1 },
  { q: 'Lama pertandingan per babak', options: ['2 menit','3 menit','4 menit','5 menit','6 menit'], answer: 1 },
  { q: 'Istirahat antar babak', options: ['1 menit','2 menit','3 menit','4 menit','5 menit'], answer: 0 },
  { q: 'Kategori tanding adalah', options: ['1 lawan 1','2 lawan 2','3 orang','4 orang','5 orang'], answer: 0 },
  { q: 'Kategori tunggal adalah', options: ['Perorangan','Berpasangan','Bertiga','Beregu','Campuran'], answer: 0 },

  { q: 'Kategori ganda adalah', options: ['Berpasangan','Sendiri','Bertiga','Beregu','Campuran'], answer: 0 },
  { q: 'Kategori regu adalah', options: ['3 orang','2 orang','1 orang','4 orang','5 orang'], answer: 0 },
  { q: 'Nilai jatuhan adalah', options: ['3','2','1','4','5'], answer: 0 },
  { q: 'Nilai tangkapan adalah', options: ['1','2','3','4','5'], answer: 0 },
  { q: 'Nilai pukulan sah adalah', options: ['1','2','3','4','5'], answer: 0 },

  { q: 'Nilai tendangan sah adalah', options: ['2','1','3','4','5'], answer: 0 },
  { q: 'Sasaran serangan adalah', options: ['Badan','Kepala','Kaki','Tangan','Semua'], answer: 0 },
  { q: 'Bagian tubuh terlarang diserang', options: ['Leher','Badan','Dada','Pinggang','Paha'], answer: 0 },
  { q: 'Wasit bertugas untuk', options: ['Memimpin pertandingan','Menilai','Mencatat','Menonton','Mengatur'], answer: 0 },
  { q: 'Juri bertugas untuk', options: ['Memberi nilai','Memimpin','Mencatat','Menonton','Mengatur'], answer: 0 },

  { q: 'Pelanggaran berat mendapat hukuman', options: ['Diskualifikasi','Teguran','Peringatan','Nilai minus','Diam'], answer: 0 },
  { q: 'Pelanggaran ringan mendapat', options: ['Teguran','Diskualifikasi','Keluar','Nilai tambah','Hadiah'], answer: 0 },
  { q: 'Tujuan pencak silat adalah', options: ['Bela diri','Olahraga','Seni','Mental','Semua benar'], answer: 4 },
  { q: 'Manfaat pencak silat adalah', options: ['Kesehatan','Kekuatan','Kecepatan','Kelincahan','Semua benar'], answer: 4 },
  { q: 'Pencak silat berasal dari', options: ['Indonesia','Malaysia','Thailand','Jepang','China'], answer: 0 }
];

const labels = ['A','B','C','D','E'];
const userAnswers = new Array(questions.length).fill(null);
let submitted = false;
let currentFilter = 'all';

function parseText(text) {
  const parts = text.split('\n\n');
  return parts.map((part, idx) => {
    const lines = part.split('\n');
    if (lines.length > 1 && idx > 0 && idx < parts.length - 1) {
      return '<span class="blockquote">' + lines.join('<br>') + '</span>';
    }
    return part.replace(/\n/g, '<br>');
  }).join('');
}

function render() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const isAnswered = userAnswers[i] !== null;
    const isCorrect = submitted && isAnswerCorrect(q, userAnswers[i]);
    const isWrong = submitted && userAnswers[i] !== null && !isAnswerCorrect(q, userAnswers[i]);
    if (currentFilter === 'unanswered' && isAnswered) return;
    if (currentFilter === 'answered' && !isAnswered) return;

    const card = document.createElement('div');
    card.className = 'question-card'
      + (submitted && isCorrect ? ' correct' : '')
      + (submitted && isWrong ? ' wrong' : '')
      + (!submitted && isAnswered ? ' answered' : '');

    const numClass = submitted && isCorrect ? 'correct-num' : submitted && isWrong ? 'wrong-num' : '';

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num ${numClass}">${i+1}</div>
        <div class="q-text">${parseText(q.q)}</div>
      </div>
      <div class="options">
        ${q.options.map((opt, j) => {
          let cls = '';
          if (submitted) {
            if (j === q.answer) cls = 'correct-ans';
            else if (userAnswers[i] === j && j !== q.answer) cls = 'wrong-ans';
          } else if (userAnswers[i] === j) cls = 'selected';
          return `<button class="option ${cls}" onclick="selectAnswer(${i}, ${j})" ${submitted ? 'disabled' : ''}>
            <span class="option-label">${labels[j]}</span>
            <span>${opt.replace(/\n/g,'<br>')}</span>
          </button>`;
        }).join('')}
      </div>
      ${submitted ? `<div class="q-result show ${isCorrect ? 'success' : 'danger'}">
        ${isCorrect
          ? '✓ Benar'
          : userAnswers[i] === null
            ? '— Tidak dijawab. Jawaban benar: ' + labels[q.answer]
            : '✗ Salah. Jawaban yang benar: ' + labels[q.answer]}
      </div>` : ''}
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qIndex, optIndex) {
  if (submitted) return;
  userAnswers[qIndex] = optIndex;
  updateStatus();
  render();
}

function updateStatus() {
  const answered = userAnswers.filter(a => a !== null).length;
  document.getElementById('answered-count').textContent = answered;
  document.getElementById('progress').style.width = Math.round(answered / questions.length * 100) + '%';
  const btn = document.getElementById('submit-btn');
  if (submitted) {
    btn.disabled = true;
    btn.textContent = 'Selesai';
    const correct = userAnswers.filter((a, i) => a === questions[i].answer).length;
    document.getElementById('summary-text').innerHTML =
      `Nilai akhir: <strong>${correct}/${questions.length}</strong> benar &nbsp;·&nbsp; ${Math.round(correct/questions.length*100)}%`;
  } else {
    btn.disabled = answered < questions.length;
    document.getElementById('summary-text').textContent = answered === questions.length
      ? 'Semua soal sudah dijawab. Siap dikumpulkan!'
      : `${questions.length - answered} soal belum dijawab`;
  }
}

function submitAll() {
  if (submitted) return;
  submitted = true;
  updateStatus();
  render();
}

function filterQuestions(type) {
  currentFilter = type;
  document.querySelectorAll('.controls .btn').forEach((b, i) => {
    b.className = 'btn' + (['all','unanswered','answered'][i] === type ? ' active' : '');
  });
  render();
}

function isAnswerCorrect(q, userAns) {
  if (q.answer === 'all') return true;
  if (Array.isArray(q.answer)) return q.answer.includes(userAns);
  return userAns === q.answer;
}

render();
updateStatus();
</script>
</body>
</html>
